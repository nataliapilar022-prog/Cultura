<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡ALERTA DEL SISTEMA!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
            text-align: center;
        }

        /* Animación de parpadeo para el fondo */
        @keyframes pulso-alerta {
            0% { background-color: #050505; }
            50% { background-color: #200000; }
            100% { background-color: #050505; }
        }

        .alerta-activa {
            animation: pulso-alerta 1.5s infinite;
        }

        .contenedor {
            border: 2px solid #ff3333;
            padding: 30px 20px;
            background-color: rgba(10, 10, 10, 0.9);
            box-shadow: 0 0 20px #ff3333;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
        }

        .icono-peligro {
            font-size: 50px;
            margin-bottom: 15px;
            animation: parpadeo 1s infinite;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .consola {
            background-color: #000000;
            border: 1px solid #333;
            color: #00ff00;
            padding: 10px;
            font-size: 11px;
            text-align: left;
            height: 100px;
            overflow-y: hidden;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .progreso-barra {
            width: 100%;
            background-color: #222;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #ff3333;
        }

        .progreso-llenado {
            width: 0%;
            height: 100%;
            background-color: #ff3333;
            transition: width 0.1s linear;
        }

        .contador {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
            margin-top: 10px;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="alerta-activa">

    <div class="contenedor">
        <div class="icono-peligro">⚠️</div>
        <h1>¡Amenaza Detectada!</h1>
        <p>Se ha detectado un software malicioso de origen desconocido que intenta extraer información del dispositivo.</p>
        
        <!-- Simulación de líneas de comando ejecutándose -->
        <div class="consola" id="consola">
            [>] Iniciando análisis de vulnerabilidad...<br>
        </div>

        <div class="progreso-barra">
            <div class="progreso-llenado" id="barra"></div>
        </div>

        <div class="contador" id="temporizador">Tiempo restante: 05:00</div>
    </div>

    <script>
        // Simulación de texto en la consola del "hacker"
        const lineas Consola = [
            "[!] Extrayendo partición de datos...",
            "[!] Accediendo a contactos y mensajes...",
            "[!] Error en cortafuegos del sistema.",
            "[!] Descargando archivos en segundo plano...",
            "[!] Alerta: Claves de cifrado comprometidas.",
            "[!] Conectando con servidor remoto...",
            "[!] Enviando paquetes de datos..."
        ];

        let index = 0;
        const consolaElement = document.getElementById('consola');
        
        function actualizarConsola() {
            if (index < lineasConsola.length) {
                consolaElement.innerHTML += lineasConsola[index] + "<br>";
                consolaElement.scrollTop = consolaElement.scrollHeight;
                index++;
                setTimeout(actualizarConsola, 1500);
            } else {
                index = 0; // Reinicia el ciclo para mantener el movimiento
                setTimeout(actualizarConsola, 1500);
            }
        }
        setTimeout(actualizarConsola, 1000);

        // Simulación de la barra de progreso interminable/bucle
        let progreso = 0;
        const barra = document.getElementById('barra');
        
        function moverBarra() {
            progreso += 1;
            if (progreso > 100) {
                progreso = 0; // Se reinicia para mantener el efecto visual
            }
            barra.style.width = progreso + '%';
            setTimeout(moverBarra, 80);
        }
        moverBarra();

        // Temporizador de cuenta regresiva simulado (5 minutos)
        let tiempo = 300; 
        const temporizador = document.getElementById('temporizador');

        function cuentaRegresiva() {
            let minutos = Math.floor(tiempo / 60);
            let segundos = tiempo % 60;

            segundos = segundos < 10 ? '0' + segundos : segundos;
            minutos = minutos < 10 ? '0' + minutos : minutos;

            temporizador.innerHTML = `Destrucción de datos en: ${minutos}:${segundos}`;
            
            if (tiempo > 0) {
                tiempo--;
                setTimeout(cuentaRegresiva, 1000);
            } else {
                temporizador.innerHTML = "SISTEMA COMPROMETIDO";
            }
        }
        cuentaRegresiva();
    </script>
</body>
</html>
